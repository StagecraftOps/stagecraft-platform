apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stagecraft
  namespace: argocd
spec:
  project: default
  source:
    # final repo will be under UST-PACE - fill in once it's actually pushed there
    # repoURL: https://github.com/UST-PACE/stagecraft-platform.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stagecraft
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
