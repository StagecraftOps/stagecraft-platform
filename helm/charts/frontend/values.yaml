namespace: stagecraft
nameOverride: ""

image:
  repository: yourregistry/stagecraft-frontend
  tag: latest
  pullPolicy: Always

replicaCount: 2
containerPort: 3000

service:
  enabled: true
  port: 80
  targetPort: 3000

serviceAccount:
  create: true
  roleArn: ""

externalSecret:
  enabled: true
  storeName: stagecraft
  awsSecretName: stagecraft-frontend-secrets
  refreshInterval: 1h

env:
  NODE_ENV: production
  NEXT_PUBLIC_API_URL: ""
  API_URL_INTERNAL: http://stagecraft-api

livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  groupName: stagecraft
  host: stagecraft.ustpace.com
  path: /
