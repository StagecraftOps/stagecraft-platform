namespace: stagecraft
nameOverride: ""

image:
  repository: yourregistry/stagecraft-mcp
  tag: latest
  pullPolicy: Always

replicaCount: 2
containerPort: 8010

service:
  enabled: true
  port: 8010
  targetPort: 8010

serviceAccount:
  create: true
  roleArn: ""

externalSecret:
  enabled: true
  storeName: stagecraft
  awsSecretName: stagecraft-mcp-secrets
  refreshInterval: 1h

env:
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8010"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
