namespace: stagecraft
nameOverride: ""

image:
  repository: yourregistry/stagecraft-worker
  tag: latest
  pullPolicy: Always

service:
  enabled: true
  port: 8080
  targetPort: 8080

serviceAccount:
  create: true
  roleArn: ""

externalSecret:
  enabled: true
  storeName: stagecraft
  awsSecretName: stagecraft-worker-secrets
  refreshInterval: 1h

env:
  ENVIRONMENT: production
  AWS_REGION: us-east-1
  BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-6
  USE_MULTI_AGENT: "true"
  USE_MCP_TOOLS: "true"
  FRONTEND_URL: https://stagecraft.example.com
  GRAPH_BACKEND: neo4j
  GRAPH_DUAL_WRITE_NEO4J: "true"

worker:
  replicaCount: 2
  command: []
  containerPort: 8080
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

consumer:
  replicaCount: 1
  command: ["python", "-m", "app.sqs_consumer"]
  containerPort: 8080
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
