<div class="p-8">
  <a routerLink="/workflows" class="inline-flex items-center gap-2 text-sm text-zinc-500 hover:text-zinc-700 mb-6 transition-colors">
    <lucide-angular [img]="icons.ArrowLeft" [size]="14"></lucide-angular>
    Back to Workflows
  </a>

  <div class="flex items-center gap-2 text-sm text-zinc-400 mb-2">
    <span>{{ owner }}</span>
    <span>/</span>
    <span class="font-semibold text-zinc-700">{{ repo }}</span>
  </div>

  <app-page-header eyebrow="Pipelines" title="Workflows" description="All GitHub Actions workflows in this repository."></app-page-header>

  <div *ngIf="error()" class="flex items-center gap-3 text-rose-600 bg-rose-50 border border-rose-200 rounded-lg p-4 mb-6">
    <lucide-angular [img]="icons.AlertCircle" [size]="16"></lucide-angular>
    <p class="text-sm">Failed to load workflows for this repository.</p>
  </div>

  <div *ngIf="!isLoading() && workflows().length === 0" class="flex flex-col items-center justify-center py-20 text-center">
    <div class="w-14 h-14 bg-zinc-100 rounded-full flex items-center justify-center mb-4">
      <lucide-angular [img]="icons.GitBranch" [size]="24" class="text-zinc-400"></lucide-angular>
    </div>
    <h3 class="text-base font-semibold text-zinc-700 mb-1">No workflows</h3>
    <p class="text-sm text-zinc-400">This repository has no GitHub Actions workflows.</p>
  </div>

  <div *ngIf="workflows().length > 0" class="bg-white border border-zinc-200 rounded-lg shadow-sm overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="border-b border-zinc-100 bg-zinc-50">
          <th class="text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4">Name</th>
          <th class="text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4">File</th>
          <th class="text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4">State</th>
          <th class="text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4">Run History</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-zinc-100">
        <tr *ngFor="let wf of workflows()" class="hover:bg-zinc-50 transition-colors">
          <td class="py-3.5 px-4"><span class="text-sm font-medium text-zinc-800">{{ wf.name }}</span></td>
          <td class="py-3.5 px-4"><span class="text-xs font-mono text-zinc-500 bg-zinc-50 border border-zinc-100 px-2 py-0.5 rounded">{{ wf.path }}</span></td>
          <td class="py-3.5 px-4"><app-badge [status]="wf.state"></app-badge></td>
          <td class="py-3.5 px-4">
            <a [href]="workflowUrl(wf)" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 text-sm text-amber-600 hover:text-amber-700 font-medium transition-colors">
              View on GitHub
              <lucide-angular [img]="icons.ExternalLink" [size]="12"></lucide-angular>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
