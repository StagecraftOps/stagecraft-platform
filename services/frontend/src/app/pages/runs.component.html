<div class="p-8">
  <app-page-header eyebrow="Pipelines" title="Workflow Runs" description="Every workflow run across all repos in your organization — replacing the per-repo Actions tab."></app-page-header>

  <div class="flex items-center gap-3 flex-wrap mb-6">
    <select [(ngModel)]="selectedRepo" (ngModelChange)="onFilterChange()" class="text-sm border border-zinc-200 rounded-md bg-white text-zinc-700 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
      <option value="all">All repos</option>
      <option *ngFor="let repo of repoOptions()" [value]="repo">{{ repo }}</option>
    </select>

    <select [(ngModel)]="statusFilter" (ngModelChange)="onFilterChange()" class="text-sm border border-zinc-200 rounded-md bg-white text-zinc-700 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
      <option value="all">Any status</option>
      <option value="queued">Queued</option>
      <option value="in_progress">In progress</option>
      <option value="completed">Completed</option>
    </select>

    <select [(ngModel)]="conclusionFilter" (ngModelChange)="onFilterChange()" class="text-sm border border-zinc-200 rounded-md bg-white text-zinc-700 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
      <option value="all">Any conclusion</option>
      <option value="success">Success</option>
      <option value="failure">Failure</option>
      <option value="cancelled">Cancelled</option>
    </select>

    <span class="text-sm text-zinc-400 ml-auto">{{ total() }} run{{ total() !== 1 ? 's' : '' }}</span>
  </div>

  <div *ngIf="error()" class="flex items-center gap-3 text-rose-600 bg-rose-50 border border-rose-200 rounded-lg p-4 mb-6">
    <lucide-angular [img]="icons.AlertCircle" [size]="16"></lucide-angular>
    <p class="text-sm">Failed to load runs. Check your connection.</p>
  </div>

  <div class="bg-white border border-zinc-200 rounded-lg shadow-sm overflow-hidden dark:bg-zinc-900 dark:border-zinc-800">
    <div class="flex flex-col space-y-1 p-5 border-b border-zinc-100 dark:border-zinc-800">
      <h3 class="text-sm font-semibold text-zinc-800 dark:text-zinc-100 leading-none tracking-tight">Runs</h3>
    </div>
    <div class="p-0 overflow-x-auto">
      <table class="w-full table-fixed">
        <thead>
          <tr class="border-b border-zinc-100 bg-zinc-50">
            <th class="w-[26%] text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4 whitespace-nowrap">Workflow</th>
            <th class="w-[16%] text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4 whitespace-nowrap">Repo</th>
            <th class="w-[11%] text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4 whitespace-nowrap">Branch</th>
            <th class="w-[9%] text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4 whitespace-nowrap">SHA</th>
            <th class="w-[12%] text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4 whitespace-nowrap">Status</th>
            <th class="w-[10%] text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4 whitespace-nowrap">Duration</th>
            <th class="w-[12%] text-left text-xs font-semibold text-zinc-500 uppercase tracking-wider py-3 px-4 whitespace-nowrap">Started</th>
            <th class="w-[4%] py-3 px-4"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-zinc-100">
          <tr *ngIf="isLoading()">
            <td colspan="8" class="py-6 text-center text-zinc-400 text-sm">Loading…</td>
          </tr>
          <tr *ngIf="!isLoading() && runs().length === 0">
            <td colspan="8">
              <div class="flex flex-col items-center justify-center py-12 text-center">
                <lucide-angular [img]="icons.AlertCircle" [size]="20" class="text-zinc-300 mb-2"></lucide-angular>
                <p class="text-sm text-zinc-400">No workflow runs match these filters.</p>
              </div>
            </td>
          </tr>
          <tr app-run-row *ngFor="let run of runs()" [run]="run" [showWorkflow]="true" [showRepo]="true"></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="total() > 25" class="flex items-center justify-between mt-4">
    <span class="text-xs text-zinc-400">Page {{ page() + 1 }} of {{ totalPages }}</span>
    <div class="flex items-center gap-2">
      <button (click)="prevPage()" [disabled]="page() === 0" class="inline-flex items-center justify-center w-8 h-8 rounded-md border border-zinc-200 text-zinc-500 hover:bg-zinc-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
        <lucide-angular [img]="icons.ChevronLeft" [size]="14"></lucide-angular>
      </button>
      <button (click)="nextPage()" [disabled]="page() >= totalPages - 1" class="inline-flex items-center justify-center w-8 h-8 rounded-md border border-zinc-200 text-zinc-500 hover:bg-zinc-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
        <lucide-angular [img]="icons.ChevronRight" [size]="14"></lucide-angular>
      </button>
    </div>
  </div>
</div>
