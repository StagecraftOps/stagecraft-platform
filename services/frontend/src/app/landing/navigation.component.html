<header
  [class]="'fixed z-50 transition-all duration-500 ' + (isScrolled() ? 'top-3 left-3 right-3' : 'top-0 left-0 right-0')"
>
  <nav
    [class]="
      'mx-auto transition-all duration-500 ' +
      (isScrolled() || mobileOpen()
        ? 'bg-white/80 backdrop-blur-xl border border-zinc-200 rounded-2xl shadow-lg max-w-5xl'
        : 'bg-transparent max-w-7xl')
    "
  >
    <div
      [class]="'flex items-center justify-between px-6 lg:px-8 transition-all duration-500 ' + (isScrolled() ? 'h-14' : 'h-20')"
    >
      <a href="/" class="flex items-center gap-2">
        <span
          [class]="'font-serif-display tracking-tight text-zinc-900 transition-all duration-500 ' + (isScrolled() ? 'text-xl' : 'text-2xl')"
        >
          Stagecraft
        </span>
      </a>

      <div class="hidden md:flex items-center gap-10">
        <a
          *ngFor="let link of navLinks"
          [href]="link.href"
          class="text-sm text-zinc-500 hover:text-zinc-900 transition-colors relative group"
        >
          {{ link.name }}
          <span class="absolute -bottom-0.5 left-0 w-0 h-px bg-zinc-900 transition-all duration-300 group-hover:w-full"></span>
        </a>
      </div>

      <div class="hidden md:flex items-center gap-4">
        <a
          href="/api/v1/auth/github"
          [class]="'text-zinc-500 hover:text-zinc-900 transition-colors ' + (isScrolled() ? 'text-xs' : 'text-sm')"
        >
          Sign in
        </a>
        <a
          href="/api/v1/auth/github"
          [class]="'bg-zinc-900 hover:bg-zinc-700 text-white rounded-full font-medium transition-all duration-300 ' + (isScrolled() ? 'px-4 py-1.5 text-xs' : 'px-5 py-2 text-sm')"
        >
          Connect GitHub
        </a>
      </div>

      <button
        (click)="toggleMobile()"
        aria-label="Toggle menu"
        class="md:hidden p-2 text-zinc-600 hover:text-zinc-900"
      >
        <lucide-angular *ngIf="mobileOpen()" [img]="icons.X" [size]="22"></lucide-angular>
        <lucide-angular *ngIf="!mobileOpen()" [img]="icons.Menu" [size]="22"></lucide-angular>
      </button>
    </div>

    <div *ngIf="mobileOpen()" class="md:hidden px-6 pb-6 pt-2 border-t border-zinc-100">
      <div class="flex flex-col gap-4">
        <a
          *ngFor="let link of navLinks"
          [href]="link.href"
          (click)="closeMobile()"
          class="text-base text-zinc-700 hover:text-zinc-900 py-1"
        >
          {{ link.name }}
        </a>
        <div class="flex gap-3 pt-4 border-t border-zinc-100">
          <a
            href="/api/v1/auth/github"
            class="flex-1 text-center border border-zinc-200 rounded-full py-2.5 text-sm text-zinc-700 hover:bg-zinc-50"
          >
            Sign in
          </a>
          <a
            href="/api/v1/auth/github"
            class="flex-1 text-center bg-zinc-900 text-white rounded-full py-2.5 text-sm font-medium"
          >
            Connect GitHub
          </a>
        </div>
      </div>
    </div>
  </nav>
</header>
