<div
  [class]="'group transition-all duration-700 ' + (visible() ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12')"
  [style.transition-delay.ms]="index * 80"
>
  <div class="flex flex-col lg:flex-row gap-8 lg:gap-16 py-12 lg:py-16 border-b border-zinc-100">
    <div class="shrink-0 w-8">
      <span class="font-code text-xs text-zinc-400">{{ feature.number }}</span>
    </div>
    <div class="flex-1 grid lg:grid-cols-2 gap-8 items-center">
      <div>
        <h3 class="font-serif-display text-3xl lg:text-4xl mb-4 text-zinc-900 group-hover:translate-x-1.5 transition-transform duration-300">
          {{ feature.title }}
        </h3>
        <p class="text-lg text-zinc-500 leading-relaxed">
          {{ feature.description }}
        </p>
      </div>
      <div class="flex justify-center lg:justify-end">
        <div class="w-44 h-36">
          <svg *ngIf="feature.visual === 'table'" viewBox="0 0 200 160" class="w-full h-full text-zinc-700">
            <rect x="20" y="20" width="160" height="120" rx="3" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3" />
            <line x1="20" y1="40" x2="180" y2="40" stroke="currentColor" stroke-width="1" opacity="0.2" />
            <g *ngFor="let i of [0, 1, 2, 3, 4]">
              <rect [attr.x]="28" [attr.y]="50 + i * 16" width="50" height="7" rx="2" fill="currentColor" opacity="0.12">
                <animate attributeName="opacity" values="0.12;0.35;0.12" dur="2s" [attr.begin]="(i * 0.2) + 's'" repeatCount="indefinite" />
              </rect>
              <rect [attr.x]="86" [attr.y]="50 + i * 16" width="36" height="7" rx="2" fill="currentColor" opacity="0.1">
                <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" [attr.begin]="(i * 0.25) + 's'" repeatCount="indefinite" />
              </rect>
              <circle cx="148" [attr.cy]="54 + i * 16" r="5" [attr.fill]="i === 2 ? '#f43f5e' : i === 0 ? '#10b981' : '#f59e0b'" opacity="0.7" />
              <rect [attr.x]="158" [attr.y]="50 + i * 16" width="16" height="7" rx="2" fill="currentColor" opacity="0.12" />
            </g>
            <text x="28" y="35" font-size="6" fill="currentColor" opacity="0.4" font-family="monospace">WORKFLOW</text>
            <text x="86" y="35" font-size="6" fill="currentColor" opacity="0.4" font-family="monospace">REPO</text>
            <text x="138" y="35" font-size="6" fill="currentColor" opacity="0.4" font-family="monospace">STATUS</text>
          </svg>

          <svg *ngIf="feature.visual === 'ai'" viewBox="0 0 200 160" class="w-full h-full text-zinc-700">
            <circle cx="100" cy="80" r="14" fill="currentColor">
              <animate attributeName="r" values="14;16;14" dur="2.5s" repeatCount="indefinite" />
            </circle>
            <g *ngFor="let spoke of aiSpokes">
              <line
                x1="100" y1="80"
                [attr.x2]="spoke.x2" [attr.y2]="spoke.y2"
                stroke="currentColor" stroke-width="1" opacity="0.2"
              >
                <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" [attr.begin]="spoke.delay" repeatCount="indefinite" />
              </line>
              <circle
                [attr.cx]="spoke.x2" [attr.cy]="spoke.y2"
                r="7" fill="none" stroke="currentColor" stroke-width="1.5"
              >
                <animate attributeName="r" values="7;9;7" dur="2s" [attr.begin]="spoke.delay" repeatCount="indefinite" />
              </circle>
            </g>
            <circle cx="100" cy="80" r="30" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0">
              <animate attributeName="r" values="20;65" dur="2.2s" repeatCount="indefinite" />
              <animate attributeName="opacity" values="0.5;0" dur="2.2s" repeatCount="indefinite" />
            </circle>
          </svg>

          <svg *ngIf="feature.visual === 'yaml'" viewBox="0 0 200 160" class="w-full h-full text-zinc-700">
            <rect x="20" y="15" width="160" height="130" rx="3" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2" />
            <rect x="20" y="15" width="160" height="18" rx="3" fill="currentColor" opacity="0.06" />
            <circle cx="32" cy="24" r="4" fill="currentColor" opacity="0.15" />
            <circle cx="44" cy="24" r="4" fill="currentColor" opacity="0.15" />
            <circle cx="56" cy="24" r="4" fill="currentColor" opacity="0.15" />
            <text x="28" y="46" font-size="7.5" fill="currentColor" opacity="0.5" font-family="monospace">name: CI</text>
            <text x="28" y="62" font-size="7.5" fill="currentColor" opacity="0.5" font-family="monospace">
              on: [push]
              <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" />
            </text>
            <text x="28" y="78" font-size="7.5" fill="currentColor" opacity="0.5" font-family="monospace">jobs:</text>
            <text x="28" y="94" font-size="7.5" fill="currentColor" opacity="0.5" font-family="monospace">&#160;&#160;build:</text>
            <text x="28" y="110" font-size="7.5" fill="currentColor" opacity="0.5" font-family="monospace">&#160;&#160;&#160;&#160;runs-on:</text>
            <text x="28" y="126" font-size="7.5" fill="currentColor" opacity="0.5" font-family="monospace">&#160;&#160;&#160;&#160;&#160;&#160;ubuntu-latest</text>
            <rect x="20" y="70" width="160" height="1" fill="#f59e0b" opacity="0.5">
              <animate attributeName="y" values="38;135" dur="3s" repeatCount="indefinite" />
              <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite" />
            </rect>
          </svg>

          <svg *ngIf="feature.visual === 'pr'" viewBox="0 0 200 160" class="w-full h-full text-zinc-700">
            <circle cx="55" cy="50" r="12" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4" />
            <circle cx="55" cy="110" r="12" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4" />
            <line x1="55" y1="62" x2="55" y2="98" stroke="currentColor" stroke-width="1.5" opacity="0.3" />
            <circle cx="145" cy="80" r="12" fill="none" stroke="currentColor" stroke-width="2">
              <animate attributeName="stroke" values="currentColor;#10b981;currentColor" dur="2s" repeatCount="indefinite" />
            </circle>
            <path d="M 67 72 Q 106 72 133 80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3">
              <animate attributeName="stroke-dashoffset" values="0;-14" dur="0.8s" repeatCount="indefinite" />
            </path>
            <circle r="4" fill="#f59e0b">
              <animateMotion dur="1.6s" repeatCount="indefinite" path="M 67 72 Q 106 72 133 80" />
            </circle>
            <text x="43" y="54" font-size="8" fill="currentColor" opacity="0.5" font-family="monospace">main</text>
            <text x="30" y="114" font-size="8" fill="currentColor" opacity="0.5" font-family="monospace">fix/ai</text>
            <text x="125" y="84" font-size="8" fill="currentColor" opacity="0.5" font-family="monospace">PR</text>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
