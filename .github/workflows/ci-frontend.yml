name: "CI — Frontend"

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/frontend/**'

defaults:
  run:
    working-directory: services/frontend

jobs:
  lint-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true

      - name: Build
        run: npm run build
        continue-on-error: true

  docker:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/frontend
          file: services/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stagecraft-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stagecraft-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump helm image tag in values-prod.yaml
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            yq eval '.frontend.image.tag = "${{ github.sha }}"' -i helm/values-prod.yaml
            git add helm/values-prod.yaml
            if git diff --cached --quiet; then
              echo "helm values already up to date"
              break
            fi
            git commit -m "chore(helm): bump frontend image tag to ${{ github.sha }} [skip ci]"
            if git push origin HEAD:main; then
              break
            fi
            echo "push rejected, retrying against latest main..."
            git fetch origin main
            git reset --soft origin/main
          done
