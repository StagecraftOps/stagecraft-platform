name: "CI - Webhook"

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/webhook/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/webhook/**'

defaults:
  run:
    working-directory: services/webhook

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[test]" flake8 black
      - name: Lint (flake8)
        run: flake8 app --max-line-length=120 --extend-ignore=E203,W503,E302,E501,W291,W293
        continue-on-error: true
      - name: Format check (black)
        run: black --check app
        continue-on-error: true
      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true

  docker:
    name: Build and Push to DockerHub
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/webhook
          file: services/webhook/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stagecraft-webhook:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stagecraft-webhook:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
