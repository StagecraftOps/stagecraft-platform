name: "CI - Worker"

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/worker/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/worker/**'

defaults:
  run:
    working-directory: services/worker

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[test]" flake8 black
      - name: Lint (flake8)
        run: flake8 app --max-line-length=120 --extend-ignore=E203,W503,E302,E501,W291,W293
        continue-on-error: true
      - name: Format check (black)
        run: black --check app
        continue-on-error: true
      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true

  docker:
    name: Build and Push to DockerHub
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/worker
          file: services/worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stagecraft-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stagecraft-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Bump helm image tag in values-prod.yaml
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            yq eval '.worker.image.tag = "${{ github.sha }}"' -i helm/values-prod.yaml
            git add helm/values-prod.yaml
            if git diff --cached --quiet; then
              echo "helm values already up to date"
              break
            fi
            git commit -m "chore(helm): bump worker image tag to ${{ github.sha }} [skip ci]"
            if git push origin HEAD:main; then
              break
            fi
            echo "push rejected, retrying against latest main..."
            git fetch origin main
            git reset --soft origin/main
          done
